version: "3"

vars:
  RYE_BIN: rye

tasks:
  default:
    desc: Sync the Rye-managed local development environment.
    deps:
      - sync-all

  rye:
    desc: Verify Rye is installed.
    status:
      - command -v {{.RYE_BIN}} >/dev/null 2>&1
    cmds:
      - echo "Rye is required. Install from https://rye.astral.sh/ and retry."
      - exit 1

  sync-preprocess:
    desc: Sync the Rye environment for preprocessing work.
    deps:
      - rye
    cmds:
      - "{{.RYE_BIN}} sync --features preprocessing"

  sync-train:
    desc: Sync the Rye environment for training work (CPU + ONNX path).
    deps:
      - rye
    cmds:
      - "{{.RYE_BIN}} sync --features training-core --features training-onnx"

  sync-streamlit:
    desc: Sync the Rye environment for streamlit work.
    deps:
      - rye
    cmds:
      - "{{.RYE_BIN}} sync --features streamlit"

  sync-all:
    desc: Sync the Rye environment with all service dependency groups.
    deps:
      - rye
    cmds:
      - "{{.RYE_BIN}} sync --features preprocessing --features training-core --features training-onnx --features streamlit"

  run-preprocess:
    desc: Run preprocessing through Rye.
    deps:
      - rye
    cmds:
      - "{{.RYE_BIN}} run preprocess"

  run-train:
    desc: Run training through Rye.
    deps:
      - rye
    cmds:
      - "{{.RYE_BIN}} run train"

  run-streamlit:
    desc: Run the Streamlit app through Rye.
    deps:
      - rye
    cmds:
      - "{{.RYE_BIN}} run streamlit-app"

  kill-streamlit:
    desc: Kill the Streamlit app process.
    cmds:
      - pkill -f "streamlit run celesify/streamlit_app/main.py" || true

  docker-build:
    desc: Build the Docker images defined in docker-compose.yml.
    cmds:
      - docker compose build

  setup:
    desc: Sync the Rye environment and build Docker images.
    deps:
      - sync-all
      - docker-build