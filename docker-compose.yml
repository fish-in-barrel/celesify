services:
  preprocessing:
    build:
      context: .
      dockerfile: services/preprocessing/Dockerfile
    image: celesify-preprocessing:latest
    environment:
      - KAGGLE_USERNAME
      - KAGGLE_KEY
    volumes:
      - ./data:/workspace/data
      - shared_outputs:/workspace/outputs
    working_dir: /workspace

  training:
    build:
      context: .
      dockerfile: services/training/Dockerfile
      args:
        BASE_IMAGE: ${TRAINING_BASE_IMAGE:-nvidia/cuda:12.4.1-devel-ubuntu22.04}
        INSTALL_GPU_DEPS: ${TRAINING_INSTALL_GPU_DEPS:-0}
    image: celesify-training:latest
    gpus: all
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
    volumes:
      - shared_outputs:/workspace/outputs
    working_dir: /workspace

  streamlit:
    build:
      context: .
      dockerfile: services/streamlit/Dockerfile
    image: celesify-streamlit:latest
    volumes:
      - shared_outputs:/workspace/outputs
    working_dir: /workspace
    ports:
      - "8501:8501"
    depends_on:
      - training

volumes:
  shared_outputs:
